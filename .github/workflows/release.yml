name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-release:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            archive_ext: tar.gz
            bin_name: geocode
          - os: macos-13
            target: x86_64-apple-darwin
            archive_ext: tar.gz
            bin_name: geocode
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
            bin_name: geocode
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip
            bin_name: geocode.exe
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install native dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgdal-dev gdal-bin libnetcdf-dev netcdf-bin zip

      - name: Install native dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install gdal netcdf

      - name: Install native dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install gdal netcdf -y
          "C:\Program Files\GDAL" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "C:\tools\netcdf\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build release binary
        env:
          GEOCODE_GIT_SHA: ${{ github.sha }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Validate packaged runtime inputs
        shell: bash
        run: |
          test -d "packaging/runtime/${{ matrix.target }}"

      - name: Validate bundled helpers (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          test -f "packaging/runtime/${{ matrix.target }}/gdalinfo"
          test -f "packaging/runtime/${{ matrix.target }}/ncdump"

      - name: Validate bundled helpers (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not (Test-Path "packaging/runtime/${{ matrix.target }}/gdalinfo.exe")) { throw 'missing bundled gdalinfo.exe' }
          if (-not (Test-Path "packaging/runtime/${{ matrix.target }}/ncdump.exe")) { throw 'missing bundled ncdump.exe' }

      - name: Package artifact (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          ROOT="geocode-${VERSION}-${{ matrix.target }}"
          mkdir -p "$ROOT/runtime"
          cp "target/${{ matrix.target }}/release/${{ matrix.bin_name }}" "$ROOT/${{ matrix.bin_name }}"
          cp -R "packaging/runtime/${{ matrix.target }}/." "$ROOT/runtime/"
          tar -czf "${ROOT}.tar.gz" "$ROOT"

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME
          $root = "geocode-$version-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path "$root/runtime" | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.bin_name }}" "$root/${{ matrix.bin_name }}"
          Copy-Item "packaging/runtime/${{ matrix.target }}/*" "$root/runtime" -Recurse
          Compress-Archive -Path $root -DestinationPath "$root.zip"

      - name: Smoke test packaged artifact (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          ROOT="geocode-${VERSION}-${{ matrix.target }}"
          rm -rf smoke && mkdir -p smoke
          tar -xzf "${ROOT}.tar.gz" -C smoke
          test -f "smoke/${ROOT}/${{ matrix.bin_name }}"
          test -f "smoke/${ROOT}/runtime/gdalinfo"
          test -f "smoke/${ROOT}/runtime/ncdump"
          "smoke/${ROOT}/${{ matrix.bin_name }}" version | grep "Target:"
          "smoke/${ROOT}/${{ matrix.bin_name }}" --version | grep "Target:"
          "smoke/${ROOT}/${{ matrix.bin_name }}" --help | grep "inspect"
          set +e
          "smoke/${ROOT}/${{ matrix.bin_name }}" inspect missing.nc >smoke/inspect.stdout 2>smoke/inspect.stderr
          status=$?
          set -e
          test "$status" -ne 0
          grep "file not found:" smoke/inspect.stderr

      - name: Smoke test packaged artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME
          $root = "geocode-$version-${{ matrix.target }}"
          if (Test-Path smoke) { Remove-Item smoke -Recurse -Force }
          New-Item -ItemType Directory -Force -Path smoke | Out-Null
          Expand-Archive -Path "$root.zip" -DestinationPath smoke
          if (-not (Test-Path "smoke/$root/${{ matrix.bin_name }}")) { throw 'missing packaged executable' }
          if (-not (Test-Path "smoke/$root/runtime/gdalinfo.exe")) { throw 'missing packaged gdalinfo.exe' }
          if (-not (Test-Path "smoke/$root/runtime/ncdump.exe")) { throw 'missing packaged ncdump.exe' }
          $versionOutput = & "smoke/$root/${{ matrix.bin_name }}" version
          if ($versionOutput -notmatch 'Target:') { throw 'version output missing target' }
          $flagVersionOutput = & "smoke/$root/${{ matrix.bin_name }}" --version
          if ($flagVersionOutput -notmatch 'Target:') { throw 'flag version output missing target' }
          $helpOutput = & "smoke/$root/${{ matrix.bin_name }}" --help
          if ($helpOutput -notmatch 'inspect') { throw 'help output missing inspect' }
          $stderrFile = Join-Path $PWD 'smoke-inspect.stderr.txt'
          $stdoutFile = Join-Path $PWD 'smoke-inspect.stdout.txt'
          $proc = Start-Process -FilePath "smoke/$root/${{ matrix.bin_name }}" -ArgumentList 'inspect','missing.nc' -NoNewWindow -Wait -PassThru -RedirectStandardError $stderrFile -RedirectStandardOutput $stdoutFile
          if ($proc.ExitCode -eq 0) { throw 'inspect missing file should fail' }
          if (-not (Select-String -Path $stderrFile -Pattern 'file not found:')) { throw 'inspect error missing file-not-found text' }

      - name: Write release metadata
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          ARCHIVE="geocode-${VERSION}-${{ matrix.target }}.${{ matrix.archive_ext }}"
          cat > "geocode-${VERSION}-${{ matrix.target }}.metadata.json" <<EOF
          {
            "name": "geocode",
            "version": "${VERSION#v}",
            "tag": "${VERSION}",
            "target": "${{ matrix.target }}",
            "archive": "${ARCHIVE}",
            "bin": "${{ matrix.bin_name }}"
          }
          EOF

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: geocode-${{ matrix.target }}
          path: |
            geocode-${{ github.ref_name }}-${{ matrix.target }}.${{ matrix.archive_ext }}
            geocode-${{ github.ref_name }}-${{ matrix.target }}.metadata.json

  publish-release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build-release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifacts
        shell: bash
        run: |
          mkdir -p release-dist
          find dist -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec cp {} release-dist/ \;
          find dist -type f -name '*.metadata.json' -exec cp {} release-dist/ \;

      - name: Generate checksums
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          cd release-dist
          shasum -a 256 *.tar.gz *.zip > "geocode-${VERSION}-checksums.txt"

      - name: Export package manager metadata
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          cd release-dist
          python3 - <<'PY'
          import json
          from pathlib import Path

          checksum_file = next(Path('.').glob('geocode-v*-checksums.txt'))
          checksums = {}
          for line in checksum_file.read_text().splitlines():
              if not line.strip():
                  continue
              checksum, filename = line.split(None, 1)
              checksums[filename.strip()] = checksum.strip()

          assets = []
          for metadata_path in sorted(Path('.').glob('*.metadata.json')):
              data = json.loads(metadata_path.read_text())
              data['checksum_sha256'] = checksums.get(data['archive'])
              assets.append(data)

          manifest = {
              'name': 'geocode',
              'tag': assets[0]['tag'] if assets else None,
              'version': assets[0]['version'] if assets else None,
              'assets': assets,
          }
          Path(f"geocode-{manifest['tag']}-release-metadata.json").write_text(
              json.dumps(manifest, indent=2) + "\n"
          )
          PY

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-dist/*.tar.gz
            release-dist/*.zip
            release-dist/*-checksums.txt
            release-dist/*-release-metadata.json
          generate_release_notes: true
