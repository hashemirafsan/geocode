name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install native dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgdal-dev gdal-bin libnetcdf-dev netcdf-bin

      - name: Install native dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install gdal netcdf

      - name: Install native dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install gdal netcdf -y
          "C:\Program Files\GDAL" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "C:\tools\netcdf\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Run tests
        env:
          GEOCODE_GIT_SHA: ${{ github.sha }}
        run: cargo test --all-targets
