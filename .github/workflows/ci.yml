name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Conda (Windows)
        if: runner.os == 'Windows'
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          activate-environment: geocode-ci
          channels: conda-forge
          channel-priority: strict

      - name: Install native dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgdal-dev gdal-bin libnetcdf-dev netcdf-bin

      - name: Install native dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install gdal netcdf

      - name: Install native dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          conda install -n geocode-ci -y -c conda-forge gdal libnetcdf
          $prefix = $env:CONDA_PREFIX
          "$prefix\Library\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "GDAL_HOME=$prefix\Library" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "GDAL_LIB_DIR=$prefix\Library\lib" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "GDAL_INCLUDE_DIR=$prefix\Library\include" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "NETCDF_DIR=$prefix\Library" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Run tests
        env:
          GEOCODE_GIT_SHA: ${{ github.sha }}
        run: cargo test --all-targets
